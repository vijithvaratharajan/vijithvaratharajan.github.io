<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <title>{{ page.title }} — Vijith Varatharajan</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --accent: #e100ff;
      --bg: linear-gradient(135deg, #1a002e 0%, #3c0055 40%, #000 100%);
      --bg-color: #0d001a;
      --text-color: #e6e6f0;
      --card-bg: rgba(255,255,255,0.06);
      --navbar-bg: linear-gradient(135deg, #2a0050, #4c0080, #2a0050);
      font-family: Inter, system-ui, sans-serif;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      background: var(--bg-color);
      color: var(--text-color);
      transition: background 0.3s ease, color 0.3s ease;
    }

    #tsparticles {
      position: fixed;
      inset: 0;
      z-index: 0 !important;
      pointer-events: none;
      opacity: 1 !important;
    }

    /* ── navbar ── */
    .navbar-custom {
      background: var(--navbar-bg, linear-gradient(135deg, #2a0050, #4c0080, #2a0050));
      border-bottom: 1px solid rgba(255,255,255,0.12);
      z-index: 12;
      position: relative;
    }
    .navbar-custom .nav-link {
      color: #f2d9ff !important;
      font-weight: 500;
    }
    .navbar-custom .nav-link:hover {
      color: var(--accent, #ff66ff) !important;
    }

    /* ── theme flash ── */
    .theme-flash {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.85), rgba(255,255,255,0) 70%);
      opacity: 0; animation: flashAnim 0.5s ease-out; z-index: 9999;
    }
    @keyframes flashAnim { from { opacity: 0.8; } to { opacity: 0; } }

    /* ── main content wrapper ── */
    .post-outer {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 80px 20px 60px;
      display: flex;
      justify-content: center;
    }

    /* ── post card ── */
    .post-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 48px 52px;
      width: 100%;
      max-width: 760px;
    }

    .back-link {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
      opacity: 0.85;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 1; color: var(--accent); }

    .post-title {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.25;
      color: #fff;
      margin-bottom: 10px;
    }

    .post-meta {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 36px;
      letter-spacing: 0.03em;
    }

    /* ── post body typography ── */
    .post-content {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.85;
      color: #d8d4e8;
    }

    .post-content p { margin-bottom: 1.4em; }

    .post-content h2 {
      font-family: Inter, system-ui, sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      margin: 2em 0 0.7em;
    }

    .post-content h3 {
      font-family: Inter, system-ui, sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: #e8d8ff;
      margin: 1.6em 0 0.5em;
    }

    .post-content a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .post-content a:hover { opacity: 0.85; }

    .post-content blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.6em 0;
      padding: 0.4em 0 0.4em 1.4em;
      color: rgba(255,255,255,0.6);
      font-style: italic;
    }

    .post-content code {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'Courier New', monospace;
    }

    .post-content hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 2.4em 0;
    }

    .post-content ul, .post-content ol {
      padding-left: 1.4em;
      margin-bottom: 1.4em;
    }
    .post-content li { margin-bottom: 0.4em; }

    /* ── light mode ── */
    :root.light-mode {
      --bg-color: #f5f2ff;
      --text-color: #24002f;
      --card-bg: rgba(255,255,255,0.92);
      --navbar-bg: linear-gradient(135deg, #ffffff, #f3e8ff);
    }
    :root.light-mode html,
    :root.light-mode body { background: var(--bg-color); color: var(--text-color); }
    :root.light-mode .navbar-custom { border-bottom: 1px solid rgba(0,0,0,0.08); }
    :root.light-mode .navbar-custom .nav-link { color: #4a006a !important; }
    :root.light-mode .post-card {
      background: rgba(255,255,255,0.88);
      border-color: rgba(0,0,0,0.08);
    }
    :root.light-mode .post-title { color: #1a001f; }
    :root.light-mode .post-meta { color: rgba(0,0,0,0.45); }
    :root.light-mode .post-content { color: #2a1a3a; }
    :root.light-mode .post-content h2 { color: #1a001f; }
    :root.light-mode .post-content h3 { color: #3a006a; }
    :root.light-mode .post-content blockquote { color: rgba(0,0,0,0.55); }
    :root.light-mode .post-content code { background: rgba(0,0,0,0.07); }
    :root.light-mode .post-content hr { border-color: rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div id="themeFlash"></div>
<div id="tsparticles"></div>

<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid px-4">
    <button class="navbar-toggler text-light" type="button" data-bs-toggle="collapse" data-bs-target="#navmenuPost">
      <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
    </button>

    <div class="collapse navbar-collapse" id="navmenuPost">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link px-3" href="/index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="/aboutme.html">About Me</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="/projects.html">My Works</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="/contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="/blog.html">Blog</a></li>
      </ul>

      <div class="form-check form-switch ms-3">
        <input class="form-check-input" type="checkbox" id="themeToggle">
        <label class="form-check-label text-light" for="themeToggle">
          <i class="bi bi-sun-fill" id="themeIcon"></i>
        </label>
      </div>

      <div class="color-theme-picker ms-2">
        <button class="color-theme-dot" data-theme="nebula"  style="background:#e100ff" title="Nebula"></button>
        <button class="color-theme-dot" data-theme="ocean"   style="background:#00d2ff" title="Ocean"></button>
        <button class="color-theme-dot" data-theme="ember"   style="background:#ff6b2b" title="Ember"></button>
        <button class="color-theme-dot" data-theme="forest"  style="background:#00e676" title="Forest"></button>
        <button class="color-theme-dot" data-theme="crimson" style="background:#ff1744" title="Crimson"></button>
      </div>
    </div>
  </div>
</nav>

<div class="post-outer">
  <article class="post-card">
    <a class="back-link" href="/blog.html">← Back to Blog</a>
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%-d %B %Y" }}</p>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<script src="/theme.js"></script>
<script>
(function(){
  var color = (window._colorThemeData && window._colorThemeData.particle) || '#ff4dff';
  function initParticles(c){
    tsParticles.load("tsparticles", {
      fullScreen: { enable: false },
      background: { color: "transparent" },
      particles: {
        number: { value: 80, density: { enable: true, area: 900 } },
        color: { value: c },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: { min: 1, max: 3 } },
        links: { enable: true, color: c, distance: 150, opacity: 0.3, width: 1 },
        move: { enable: true, speed: 0.6, outModes: "bounce" }
      },
      interactivity: {
        events: { onHover: { enable: true, mode: "repulse" } },
        modes: { repulse: { distance: 100 } }
      },
      detectRetina: true
    });
  }
  window.reloadParticles = function(c){
    var existing = tsParticles.domItem(0);
    if(existing) existing.destroy();
    initParticles(c || '#ff4dff');
  };
  initParticles(color);
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  var themeToggle = document.getElementById("themeToggle");
  var themeIcon   = document.getElementById("themeIcon");
  var themeFlash  = document.getElementById("themeFlash");

  if (localStorage.getItem("theme") === "light") {
    document.documentElement.classList.add("light-mode");
    themeToggle.checked = true;
    themeIcon.classList.replace("bi-sun-fill", "bi-moon-stars-fill");
  }

  function playFlash() {
    themeFlash.classList.add("theme-flash");
    setTimeout(function(){ themeFlash.classList.remove("theme-flash"); }, 500);
  }

  themeToggle.addEventListener("change", function() {
    document.documentElement.classList.toggle("light-mode");
    playFlash();
    if (document.documentElement.classList.contains("light-mode")) {
      themeIcon.classList.replace("bi-sun-fill", "bi-moon-stars-fill");
      localStorage.setItem("theme", "light");
    } else {
      themeIcon.classList.replace("bi-moon-stars-fill", "bi-sun-fill");
      localStorage.setItem("theme", "dark");
    }
    if (typeof window.reapplyColorTheme === "function") window.reapplyColorTheme();
  });
</script>

</body>
</html>
